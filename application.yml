# Spring Boot 配置文件
server:
    port: 7340

spring:
    application:
        name: taorunhui-ai

    # Spring AI 配置
    ai:
        dashscope:
            api-key: ${DASHSCOPE_API_KEY:sk-your-actual-api-key-here}  # 请替换为实际的API密钥或设置环境变量
            chat:
                options:
                    model: qwen-max  # 可选模型: qwen-turbo, qwen-plus, qwen-max, qwen-max-1201, qwen-max-longcontext
                    temperature: 0.7
                    max-tokens: 2048

        # Spring AI 阿里巴巴配置
        alibaba:
            chat:
                options:
                    model: qwen-max # 模型名称
                    temperature: 0.7
                    topP: 0.8
                    maxTokens: 2048
            embeddings:
                options:
                    model: text-embedding-v1

# 阿里云通义千问(DashScope) 额外配置
dashscope:
    api:
        key: ${DASHSCOPE_API_KEY:your-dashscope-api-key-here}
    chat:
        options:
            model: qwen-max # 可选模型: qwen-turbo, qwen-plus, qwen-max, qwen-max-1201, qwen-max-longcontext
            temperature: 0.7
            max-tokens: 2048

# 日志配置
logging:
    level:
        org.springframework.ai: DEBUG
        com.taorunhui: DEBUG
        com.alibaba.cloud.ai: DEBUG

app:
    upload:
        dir: ${UPLOAD_DIR:./uploads}  # 默认项目根目录下的 uploads 文件夹

# 自定义配置
taorunhui:
    ai:
        streaming:
            enabled: true
            buffer-size: 1024
            timeout: 30000
        react-agent:
            max-thoughts: 5
            enable-reasoning: true